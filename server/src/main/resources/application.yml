spring:
  application:
    name: platform-cloudbox
  
  datasource:
    url: jdbc:mysql://localhost:3306/cloudbox?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # MyBatis 配置
  mybatis:
    # 实体类包路径（用于类型别名）
    type-aliases-package: cloudbox.platform.entity
    # MyBatis 配置
    configuration:
      # 开启驼峰命名转换
      map-underscore-to-camel-case: true
      # 开启二级缓存
      cache-enabled: true
      # 日志实现
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    cloudbox.platform: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
