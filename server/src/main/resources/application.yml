spring:
  application:
    name: platform-cloudbox
  profiles:
    active: dev  # 默认激活开发环境

  # MySQL 数据源
  datasource:
    url: jdbc:mysql://localhost:3306/cloudbox?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: cloudbox.platform.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl


server:
  port: 7223
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    cloudbox.platform: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
