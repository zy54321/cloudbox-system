<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>有云匣子场景</title>
  <link
    rel="stylesheet"
    href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css"
  />
  <style>
    html, body, #cesium-container {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #08111f;
    }

    .scene-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      padding: 6px 10px;
      border-radius: 999px;
      font: 12px/1.2 sans-serif;
      color: #fff;
      background: rgba(10, 24, 44, 0.82);
      border: 1px solid rgba(133, 198, 255, 0.45);
    }

    /* --- HUD: 复位 / 指北针 / 比例尺 --- */
    .cb-map-hud {
      position: absolute;
      left: 16px;
      bottom: 140px;
      z-index: 36;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    .cb-map-hud__tools {
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    .cb-map-tool {
      pointer-events: auto;
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 1px solid rgba(0, 197, 255, 0.62);
      background: rgba(7, 22, 50, 0.58);
      box-shadow: inset 0 0 16px rgba(0, 197, 255, 0.22), 0 8px 18px rgba(0, 0, 0, 0.18);
      color: #EAFBFF;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
      user-select: none;
    }
    .cb-map-tool--home {
      width: 56px;
      font-size: 13px;
      font-weight: 700;
    }
    .cb-map-tool--compass {
      position: relative;
      width: 52px;
      height: 52px;
      border-radius: 50%;
    }
    .cb-map-tool__compass-ring {
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.26);
    }
    .cb-map-tool__compass-arrow {
      position: absolute;
      left: 50%;
      top: 9px;
      width: 0;
      height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-bottom: 18px solid #00E5FF;
      transform-origin: 50% 17px;
    }
    .cb-map-tool__compass-text {
      position: absolute;
      top: 4px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 800;
      color: #FFFFFF;
      text-shadow: 0 0 8px rgba(0, 197, 255, 0.6);
    }
    .cb-map-scale {
      display: inline-flex;
      flex-direction: column;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid rgba(0, 197, 255, 0.42);
      background: rgba(7, 22, 50, 0.52);
      box-shadow: inset 0 0 16px rgba(0, 197, 255, 0.16), 0 8px 18px rgba(0, 0, 0, 0.18);
      color: #EAFBFF;
      backdrop-filter: blur(8px);
    }
    .cb-map-scale__label {
      font-size: 12px;
      line-height: 1;
      color: rgba(255, 255, 255, 0.92);
    }
    .cb-map-scale__bar {
      display: block;
      height: 0;
      border-top: 3px solid #00E5FF;
      border-left: 2px solid #00E5FF;
      border-right: 2px solid #00E5FF;
      box-sizing: border-box;
    }
  </style>
</head>
<body data-scenario="left">
  <div class="scene-badge">Left / 有云匣子</div>
  <div id="cesium-container"></div>

  <div class="cb-map-hud">
    <div class="cb-map-hud__tools">
      <button class="cb-map-tool cb-map-tool--home" type="button" id="btn-home" title="复位">复位</button>
      <button class="cb-map-tool cb-map-tool--compass" type="button" id="btn-compass" title="回正北">
        <span class="cb-map-tool__compass-ring"></span>
        <span class="cb-map-tool__compass-arrow" id="compass-arrow"></span>
        <span class="cb-map-tool__compass-text">N</span>
      </button>
    </div>
    <div class="cb-map-scale">
      <span class="cb-map-scale__label" id="scale-label"></span>
      <span class="cb-map-scale__bar" id="scale-bar" style="width:40px"></span>
    </div>
  </div>

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js"></script>
  <script src="./js/mock-data.js"></script>
  <script src="./js/scene.js"></script>
</body>
</html>
